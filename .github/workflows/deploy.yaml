name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - "config.yaml"
      - ".github/workflows/deploy.yaml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: OpenTofu Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: OpenTofu init
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_TABLE: ${{ secrets.TF_STATE_TABLE }}
        run: |
          set -euo pipefail
          if [ -n "${TF_STATE_BUCKET}" ] && [ -n "${TF_STATE_TABLE}" ]; then
            tofu init -input=false \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="region=${AWS_REGION}"
          else
            tofu init -input=false
          fi

      - name: OpenTofu plan
        env:
          TF_VAR_gh_token: ${{ secrets.TF_VAR_gh_token }}
        run: tofu plan -input=false -out=tfplan

      - name: OpenTofu apply
        env:
          TF_VAR_gh_token: ${{ secrets.TF_VAR_gh_token }}
        run: tofu apply -input=false -auto-approve tfplan
